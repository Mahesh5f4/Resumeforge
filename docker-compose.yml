version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: resumeforge-redis

    ports:
      - "6379:6379"

    restart: unless-stopped

    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
